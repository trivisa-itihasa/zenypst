name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseName: ${{ github.ref_type == 'tag' && format('Zenypst {0}', github.ref_name) || format('Zenypst Manual Build #{0}', github.run_number) }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Update release body with platform guide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --notes "$(cat <<'BODY'
          ## Download Guide

          | File | Platform | Description |
          |------|----------|-------------|
          | `Zenypst_*_universal.dmg` | **macOS** (Apple Silicon + Intel) | Disk image installer |
          | `Zenypst.app.tar.gz` | **macOS** (Apple Silicon + Intel) | App bundle (for Sparkle updater) |
          | `Zenypst_*_x64-setup.exe` | **Windows** (64-bit) | NSIS installer |
          | `Zenypst_*_x64_en-US.msi` | **Windows** (64-bit) | MSI installer |
          | `zenypst_*_amd64.deb` | **Linux** (Debian/Ubuntu, 64-bit) | Debian package |
          | `zenypst_*_amd64.AppImage` | **Linux** (64-bit) | Portable AppImage |
          BODY
          )"

